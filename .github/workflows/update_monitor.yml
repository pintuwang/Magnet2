name: Stock Max Pain Monitor

on:
  schedule:
    - cron: '0 13 * * 1-5'   # Intraday  (1 PM UTC  = 9 PM SGT)
    - cron: '0 22 * * 1-5'   # Post-close (10 PM UTC = 6 AM SGT next day)
  workflow_dispatch:           # Manual trigger from Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write              # Required to commit JSON data back to repo

# ── Node.js 24 compatibility ──────────────────────────────────────────────────
# Opts in ahead of June 2 2026 forced cutover (Node 20 removed Sep 16 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # Extended for multiple tickers

    steps:
      # ── UPDATED: v3 → v4 (Node 20 → 24 compatible) ──
      - uses: actions/checkout@v4

      - name: Set up Python
        # ── UPDATED: v4 → v5 (Node 20 → 24 compatible) ──
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Monitor
        run: python calculate_pain.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ tickers.json
          git commit -m "Update Market Data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]" || echo "No changes to commit"
          git fetch origin main
          git pull --rebase -X theirs origin main
          git push origin main
